<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AI Planner | ExploreX</title>
    <link rel="manifest" href="./manifest.json">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;800;900&family=Plus+Jakarta+Sans:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        /* --- Premium Cinematic CSS Variables --- */
        :root {
            --primary: #0ea5e9; /* Vibrant Ocean Blue */
            --primary-dark: #0284c7;
            --accent: #f59e0b; /* Golden Sun */
            --bg-light: #f8fafc;
            --text-dark: #0f172a;
            --text-muted: #e2e8f0; /* Lightened for dark background */
            
            /* Glassmorphism Variables */
            --glass-header: rgba(15, 23, 42, 0.85);
            --card-glass: rgba(15, 23, 42, 0.6); /* Darker glass for AI page */
            --card-border: rgba(255, 255, 255, 0.15);
            --glow: rgba(14, 165, 233, 0.4);
        }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Inter', 'Segoe UI', sans-serif; }
        
        /* Cinematic Fixed Background */
        body { 
            font-family: 'Plus Jakarta Sans', sans-serif;
            background: linear-gradient(rgba(15, 23, 42, 0.4), rgba(15, 23, 42, 0.8)), 
                        url('https://images.unsplash.com/photo-1476514525535-07fb3b4ae5f1?auto=format&fit=crop&w=2000&q=80') no-repeat center center fixed;
            background-size: cover;
            color: white; 
            overflow-x: hidden; 
            -webkit-font-smoothing: antialiased;
        }

        h1, h2, h3, h4, .brand, .search-btn, .card-btn { font-family: 'Outfit', sans-serif; }
        a { text-decoration: none; color: inherit; }

        /* --- Custom Aeroplane Preloader --- */
        #preloader {
            position: fixed; top: 0; left: 0; right: 0; bottom: 0;
            background: linear-gradient(135deg, #0f172a, #1e293b); z-index: 9999;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            transition: opacity 0.8s ease, visibility 0.8s ease;
        }
        .plane-container { position: relative; width: 120px; height: 120px; }
        .aeroplane {
            position: absolute; top: 50%; left: 50%; width: 60px; height: 60px;
            margin-top: -30px; margin-left: -30px; fill: none; stroke: var(--primary);
            stroke-width: 2; stroke-linecap: round; stroke-linejoin: round;
            filter: drop-shadow(0 0 10px var(--glow)); animation: flyPlane 2.5s ease-in-out infinite alternate;
        }
        .trail {
            position: absolute; height: 2px; background: rgba(255, 255, 255, 0.5);
            border-radius: 2px; top: 50%; right: 50%; animation: trailMove 1.5s linear infinite;
        }
        .trail:nth-child(2) { top: 40%; animation-delay: 0.2s; }
        .trail:nth-child(3) { top: 60%; animation-delay: 0.5s; }
        .preloader-text {
            margin-top: 30px; color: white; font-family: 'Outfit', sans-serif; font-size: 24px;
            font-weight: 800; letter-spacing: 2px; text-transform: uppercase;
            animation: pulseText 1.5s ease-in-out infinite alternate;
        }

        @keyframes flyPlane { 0% { transform: translateY(10px) rotate(-5deg); } 100% { transform: translateY(-10px) rotate(5deg); } }
        @keyframes trailMove { 0% { width: 0; opacity: 1; transform: translateX(0); } 100% { width: 40px; opacity: 0; transform: translateX(-60px); } }
        @keyframes pulseText { 0% { opacity: 0.5; text-shadow: 0 0 0px var(--glow); } 100% { opacity: 1; text-shadow: 0 0 15px var(--glow); } }

        /* --- Header (App Bar) --- */
        header {
            position: fixed; top: 0; left: 0; right: 0; height: 80px;
            background: var(--glass-header); backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px);
            display: flex; justify-content: space-between; align-items: center;
            padding: 0 30px; box-shadow: 0 4px 30px rgba(0,0,0,0.2); z-index: 100;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }
        .header-left { display: flex; align-items: center; gap: 20px; }
        .menu-btn { background: none; border: none; font-size: 28px; cursor: pointer; color: white; transition: transform 0.2s; }
        .menu-btn:hover { transform: scale(1.1); }
        .brand { font-size: 28px; font-weight: 900; color: white; letter-spacing: -0.5px; }
        .brand span { color: var(--primary); text-shadow: 0 0 10px var(--glow); }
        
        .profile-pic {
            width: 48px; height: 48px; border-radius: 50%; object-fit: cover;
            cursor: pointer; border: 3px solid var(--primary); transition: all 0.3s;
            box-shadow: 0 4px 15px var(--glow); opacity: 0; transition: opacity 0.5s ease;
        }

        /* --- Side Panel (Drawer) --- */
        .drawer-overlay {
            position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(15, 23, 42, 0.7);
            backdrop-filter: blur(5px); opacity: 0; pointer-events: none; transition: opacity 0.3s ease; z-index: 999;
        }
        .drawer {
            position: fixed; top: 0; left: -320px; width: 320px; height: 100%;
            background: white; box-shadow: 5px 0 30px rgba(0,0,0,0.3);
            transition: left 0.3s cubic-bezier(0.4, 0, 0.2, 1); display: flex; flex-direction: column; padding: 30px; z-index: 1000;
        }
        .drawer.open { left: 0; }
        .drawer-overlay.show { opacity: 1; pointer-events: all; }
        .drawer h2 { color: var(--primary-dark); margin-bottom: 35px; margin-top: 10px; font-size: 28px; font-weight: 900; letter-spacing: -0.5px; font-family: 'Outfit', sans-serif;}
        .drawer a { padding: 18px 0; font-size: 18px; font-weight: 600; border-bottom: 1px solid #f1f5f9; display: flex; align-items: center; gap: 15px; color: var(--text-dark); transition: all 0.2s;}
        .drawer a:hover { color: var(--primary); padding-left: 10px; background: #f8fafc; border-radius: 8px;}

        /* --- Main Content --- */
        main { padding: 110px 20px 60px; max-width: 1000px; margin: 0 auto; }
        
        .hero { text-align: center; color: white; margin-bottom: 40px; text-shadow: 0 4px 15px rgba(0,0,0,0.4); }
        .hero h1 { font-size: 46px; font-weight: 900; margin-bottom: 10px; letter-spacing: -1px; }
        .hero p { font-size: 20px; font-weight: 500;}

        /* --- Search / Journey Planner Card (Glassmorphism) --- */
        .search-card {
            background: var(--card-glass); border-radius: 24px; padding: 40px;
            box-shadow: 0 25px 50px rgba(0,0,0,0.3); margin-bottom: 40px;
            position: relative; z-index: 10; border: 1px solid var(--card-border);
            backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
        }
        .search-card h2 { color: white; margin-bottom: 25px; font-size: 32px; font-weight: 800; letter-spacing: -0.5px;}
        
        .input-group { position: relative; margin-bottom: 25px; }
        .input-group label { display: block; font-size: 14px; font-weight: 700; color: var(--text-muted); margin-bottom: 10px; text-transform: uppercase; letter-spacing: 0.5px;}
        
        .input-group input { 
            width: 100%; padding: 20px; border: 2px solid rgba(255,255,255,0.2); border-radius: 14px; 
            font-size: 18px; font-weight: 600; outline: none; transition: all 0.3s; 
            color: white; background: rgba(0,0,0,0.4); 
        }
        .input-group input:focus { border-color: var(--primary); transform: translateY(-2px); box-shadow: 0 10px 20px var(--glow); background: rgba(0,0,0,0.6); }
        .input-group input::placeholder { color: rgba(255,255,255,0.5); }
        
        .search-btn { 
            background: linear-gradient(135deg, var(--primary), var(--primary-dark)); 
            color: white; border: none; padding: 22px; width: 100%; border-radius: 14px; font-size: 22px; font-weight: 800; 
            cursor: pointer; transition: all 0.3s ease; text-transform: uppercase; letter-spacing: 1px; box-shadow: 0 10px 25px var(--glow);
            display: flex; justify-content: center; align-items: center; gap: 10px;
        }
        .search-btn:hover { transform: translateY(-3px); box-shadow: 0 15px 35px var(--glow); }
        .search-btn:disabled { opacity: 0.7; cursor: not-allowed; transform: none; }

        .loader-text { text-align: center; color: var(--primary); font-weight: 800; font-size: 18px; margin-bottom: 30px; display: none; text-shadow: 0 0 10px var(--glow); animation: pulseText 1.5s infinite alternate; }

        /* --- Dynamic AI Results Section --- */
        #results-container { display: none; margin-bottom: 50px; animation: slideUp 0.6s cubic-bezier(0.16, 1, 0.3, 1); }
        @keyframes slideUp { from { opacity: 0; transform: translateY(40px); } to { opacity: 1; transform: translateY(0); } }
        
        .result-header { 
            background: linear-gradient(135deg, rgba(15, 23, 42, 0.9), rgba(15, 23, 42, 0.7)); 
            backdrop-filter: blur(10px); border: 1px solid var(--card-border);
            color: white; padding: 25px 30px; border-radius: 20px; margin-bottom: 30px; 
            display: flex; justify-content: space-between; align-items: center; box-shadow: 0 15px 30px rgba(0,0,0,0.4);
        }
        .result-header h2 { font-size: 28px; font-weight: 800; margin: 0; }
        .distance-badge { background: var(--primary); color: white; padding: 8px 18px; border-radius: 30px; font-weight: 800; font-size: 16px; box-shadow: 0 4px 10px var(--glow);}

        .info-card { 
            background: var(--card-glass); padding: 30px; border-radius: 20px; margin-bottom: 30px; 
            box-shadow: 0 15px 35px rgba(0,0,0,0.3); border: 1px solid var(--card-border); backdrop-filter: blur(20px);
        }
        .info-card h3 { margin: 0 0 15px 0; color: white; font-size: 24px; font-weight: 800; border-bottom: 2px solid rgba(255,255,255,0.1); padding-bottom: 12px;}
        
        .route-tag { display: inline-block; background: rgba(14, 165, 233, 0.2); border: 1px solid var(--primary); color: white; padding: 6px 14px; border-radius: 20px; font-size: 14px; font-weight: 600; margin: 4px 8px 4px 0; }

        .entity-list { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 15px; }
        .entity-card { 
            background: rgba(0,0,0,0.5); padding: 20px; border-radius: 12px; border: 1px solid rgba(255,255,255,0.1); 
            display: flex; flex-direction: column; gap: 8px; transition: transform 0.2s; 
        }
        .entity-card:hover { transform: translateY(-5px); border-color: var(--primary); box-shadow: 0 10px 20px rgba(0,0,0,0.3); }
        .entity-card .title { font-weight: 800; color: white; font-size: 18px; display: flex; justify-content: space-between;}
        .entity-card .price { color: var(--accent); font-weight: 800; }
        .entity-card .detail { font-size: 14px; color: var(--text-muted); line-height: 1.5; font-weight: 500;}

        .map-btn { display: inline-block; background: #10b981; color: white; padding: 12px 20px; border-radius: 12px; font-weight: 800; font-size: 16px; margin-top: 15px; text-align: center; transition: 0.2s; box-shadow: 0 4px 15px rgba(16, 185, 129, 0.4); }
        .map-btn:hover { transform: scale(1.02); background: #059669; }

    </style>
</head>
<body>

    <div id="preloader">
        <div class="plane-container">
            <div class="trail"></div>
            <div class="trail"></div>
            <div class="trail"></div>
            <svg class="aeroplane" viewBox="0 0 24 24">
                <path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 16.92z" opacity="0"></path>
                <path d="M17.8 19.2L16 11l3.5-3.5C21 6 21.5 4 21 3c-.5-.5-2.5 0-4.5 1.5L13 8 4.8 6.2c-.5-.1-.9.2-1.1.6L3 8l6.5 4.5L6 16l-3.2-1.1c-.4-.1-.8.1-1 .5L1 17l4.5 2L10 23l1.5-1.5c.4-.3.6-.8.5-1.2L11 17l3.5-3.5 8.5 8.2c.4.4 1 .2 1.2-.3l.6-1.5c.2-.6-.2-1.1-.8-1.2z" fill="var(--primary)" stroke="none" filter="drop-shadow(0px 0px 5px var(--glow))"/>
            </svg>
        </div>
        <div class="preloader-text">ExploreX AI</div>
    </div>

    <header>
        <div class="header-left">
            <button class="menu-btn" onclick="openDrawer()">☰</button>
            <div class="brand">Explore<span>X</span></div>
        </div>
        <a href="profile.html">
            <img id="user-dp" class="profile-pic" src="" alt="Profile">
        </a>
    </header>

    <div class="drawer-overlay" id="drawer-overlay" onclick="closeDrawer()"></div>
    <div class="drawer" id="drawer">
        <h2>ExploreX Menu</h2>
        <a href="home.html">🏠 Dashboard</a>
        <a href="profile.html">👤 My Profile</a>
        <a href="bus.html">🚌 Book a Bus</a>
        <a href="cab.html">🚕 Book a Cab</a>
        <a href="air.html">✈️ Flight Tickets</a>
        <a href="aitour.html" style="color: var(--primary); font-weight: 800; background: #f0f9ff; border-radius: 8px; padding-left: 10px;">🤖 AI Tour Planner</a>
        <a href="#" id="logout-btn" style="color: red; margin-top: auto;">🚪 Logout</a>
    </div>

    <main>
        <div class="hero">
            <h1>AI Route Intelligence</h1>
            <p>Let our engine craft your perfect itinerary instantly.</p>
        </div>

        <div class="search-card">
            <h2>Plan Your Journey</h2>
            
            <div class="input-group">
                <label>Starting Point</label>
                <input type="text" id="origin" placeholder="e.g., Chennai, India" autocomplete="off">
            </div>

            <div class="input-group">
                <label>Destination</label>
                <input type="text" id="destination" placeholder="e.g., Munnar, Kerala" autocomplete="off">
            </div>

            <button class="search-btn" id="generate-btn">
                <span>Engage AI Engine</span> 🚀
            </button>
        </div>

        <div class="loader-text" id="loading-indicator">
            Compiling maps, finding hotels, and generating routes... ⏳
        </div>

        <div id="results-container">
            </div>
    </main>

    <script type="module">
        import { auth } from './config.js'; // Removed db import, not using Firebase data here
        import { onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/12.14.0/firebase-auth.js";

        // Auth & UI Initialization
        onAuthStateChanged(auth, (user) => {
            if (user) {
                const dp = document.getElementById('user-dp');
                dp.src = user.photoURL ? user.photoURL : 'https://via.placeholder.com/48';
                dp.style.opacity = "1";
                
                // Remove preloader once verified
                setTimeout(() => {
                    const preloader = document.getElementById('preloader');
                    preloader.style.opacity = '0';
                    setTimeout(() => preloader.style.visibility = 'hidden', 800);
                }, 800);
            } else {
                window.location.href = 'login.html';
            }
        });

        document.getElementById('logout-btn').addEventListener('click', (e) => {
            e.preventDefault();
            signOut(auth).then(() => { window.location.href = 'login.html'; });
        });
    </script>

    <script>
        // Drawer Logic
        const drawer = document.getElementById('drawer');
        const overlay = document.getElementById('drawer-overlay');

        window.openDrawer = () => { drawer.classList.add('open'); overlay.classList.add('show'); }
        window.closeDrawer = () => { drawer.classList.remove('open'); overlay.classList.remove('show'); }

        // AI Logic & JSON UI Rendering
        const generateBtn = document.getElementById('generate-btn');
        const originInput = document.getElementById('origin');
        const destInput = document.getElementById('destination');
        const resultsContainer = document.getElementById('results-container');
        const loader = document.getElementById('loading-indicator');

        generateBtn.addEventListener('click', async () => {
            const origin = originInput.value.trim();
            const destination = destInput.value.trim();

            if (!origin || !destination) {
                alert("Please enter both an origin and destination to engage the AI.");
                return;
            }

            generateBtn.disabled = true;
            generateBtn.innerHTML = "Processing Data...";
            loader.style.display = 'block';
            resultsContainer.style.display = 'none';

            // Instructing the AI to return strictly parsed JSON data
            const jsonPrompt = `
                Analyze a trip from ${origin} to ${destination}.
                You MUST respond ONLY with a raw, valid JSON object. Do not include markdown formatting like \`\`\`json. 
                Use exactly this structure:
                {
                    "distance": "e.g., 580 km",
                    "time": "e.g., 10 hours 30 mins",
                    "map_url": "Direct Google maps directions URL from ${origin} to ${destination}",
                    "routes": ["Highway Name 1", "Alternative Route 2"],
                    "hotels": [
                        {"name": "Hotel Name", "price": "Estimated Price/Night", "desc": "Short description"}
                    ],
                    "spots": [
                        {"name": "Spot Name", "desc": "Why visit here?"}
                    ],
                    "food": [
                        {"name": "Dish Name", "desc": "Local delicacy description"}
                    ]
                }
            `;

            try {
                // Hitting your Hugging Face Backend!
                const response = await fetch('https://wasimakthar-explorex.hf.space/api/chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ history: [{ role: "user", parts: [{ text: jsonPrompt }] }] })
                });

                if (!response.ok) throw new Error("Backend connection failed.");

                const data = await response.json();
                let rawText = data.candidates[0].content.parts[0].text;
                
                // Strip markdown backticks if AI sneaks them in
                rawText = rawText.replace(/```json/gi, '').replace(/```/g, '').trim();
                const aiData = JSON.parse(rawText);

                // 1. Build Route Tags
                let routesHTML = aiData.routes.map(r => `<span class="route-tag">🛣️ ${r}</span>`).join('');
                
                // 2. Build Hotels Grid
                let hotelsHTML = aiData.hotels.map(h => `
                    <div class="entity-card">
                        <span class="title">🏨 ${h.name} <span class="price">${h.price}</span></span>
                        <span class="detail">${h.desc}</span>
                    </div>
                `).join('');

                // 3. Build Spots Grid
                let spotsHTML = aiData.spots.map(s => `
                    <div class="entity-card">
                        <span class="title">📸 ${s.name}</span>
                        <span class="detail">${s.desc}</span>
                    </div>
                `).join('');

                // 4. Build Food Grid
                let foodHTML = aiData.food.map(f => `
                    <div class="entity-card">
                        <span class="title">🍽️ ${f.name}</span>
                        <span class="detail">${f.desc}</span>
                    </div>
                `).join('');

                // Inject formatted UI into DOM
                resultsContainer.innerHTML = `
                    <div class="result-header">
                        <h2>Journey Overview</h2>
                        <div class="distance-badge">⏱️ ${aiData.time} | 📏 ${aiData.distance}</div>
                    </div>

                    <div class="info-card">
                        <h3>Navigation & Routes</h3>
                        <div style="margin-bottom: 15px;">${routesHTML}</div>
                        <a href="${aiData.map_url}" target="_blank" class="map-btn">📍 Open Live Google Maps Navigation</a>
                    </div>

                    <div class="info-card">
                        <h3>Famous Attractions</h3>
                        <div class="entity-list">${spotsHTML}</div>
                    </div>

                    <div class="info-card">
                        <h3>Recommended Premium Stays</h3>
                        <div class="entity-list">${hotelsHTML}</div>
                    </div>

                    <div class="info-card">
                        <h3>Local Delicacies to Try</h3>
                        <div class="entity-list">${foodHTML}</div>
                    </div>
                `;

                resultsContainer.style.display = 'block';

            } catch (error) {
                console.error("AI Error:", error);
                resultsContainer.innerHTML = `
                    <div class="info-card" style="border-color: #ef4444;">
                        <h3 style="color: #ef4444; border-bottom: none;">❌ System Error</h3>
                        <p style="color: #f87171;">Failed to connect to the AI engine or parse the data. Ensure your Hugging Face backend is running.</p>
                    </div>`;
                resultsContainer.style.display = 'block';
            } finally {
                generateBtn.disabled = false;
                generateBtn.innerHTML = `<span>Engage AI Engine</span> 🚀`;
                loader.style.display = 'none';
            }
        });
    </script>
</body>
</html>
