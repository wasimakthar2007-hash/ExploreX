<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ExploreX | AI Route Intelligence</title>
    <link rel="manifest" href="./manifest.json">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;800&display=swap" rel="stylesheet">
    <style>
        /* --- AUTO LIGHT/DARK MODE VARIABLES --- */
        :root {
            --bg-color: #f8fafc;
            --surface-color: #ffffff;
            --text-main: #0f172a;
            --text-muted: #64748b;
            --primary: #0d9488;
            --primary-hover: #0f766e;
            --border-color: #e2e8f0;
            --shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.05);
        }

        @media (prefers-color-scheme: dark) {
            :root {
                --bg-color: #0f172a;
                --surface-color: #1e293b;
                --text-main: #f8fafc;
                --text-muted: #94a3b8;
                --border-color: #334155;
                --shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.5);
            }
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Inter', sans-serif; }
        
        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            transition: background-color 0.3s, color 0.3s;
            overflow-x: hidden;
        }

        /* --- SPLASH SCREEN STYLES --- */
        #splash-screen {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            background-color: var(--bg-color); display: flex; flex-direction: column;
            justify-content: center; align-items: center; z-index: 9999;
            transition: opacity 0.8s ease-out;
        }
        .app-logo { width: 120px; height: 120px; animation: breathe 2.5s ease-in-out infinite; }
        .brand-name { font-size: 36px; font-weight: 800; margin-top: 20px; }
        .brand-name span { color: var(--primary); }
        .spinner { width: 30px; height: 30px; border: 3px solid var(--border-color); border-top: 3px solid var(--primary); border-radius: 50%; margin-top: 30px; animation: spin 1s linear infinite; }

        @keyframes breathe { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.08); } }
        @keyframes spin { 100% { transform: rotate(360deg); } }

        /* --- MAIN AI PANEL STYLES --- */
        #main-app {
            display: none; opacity: 0; max-width: 800px; margin: 0 auto; padding: 20px;
            animation: fadeIn 0.8s ease-in forwards;
        }
        @keyframes fadeIn { to { opacity: 1; } }

        header { text-align: center; margin-bottom: 30px; padding-top: 20px; }
        header h1 { font-size: 28px; font-weight: 800; display: flex; align-items: center; justify-content: center; gap: 10px; }
        header p { color: var(--text-muted); font-size: 14px; margin-top: 5px; }

        .input-card {
            background: var(--surface-color); padding: 25px; border-radius: 20px;
            box-shadow: var(--shadow); border: 1px solid var(--border-color);
            display: flex; flex-direction: column; gap: 15px; margin-bottom: 30px;
        }
        .input-group { display: flex; flex-direction: column; gap: 8px; }
        .input-group label { font-size: 13px; font-weight: 600; color: var(--text-muted); text-transform: uppercase; letter-spacing: 1px; }
        .input-group input {
            padding: 15px; border-radius: 12px; border: 1px solid var(--border-color);
            background: var(--bg-color); color: var(--text-main); font-size: 16px; outline: none; transition: 0.2s;
        }
        .input-group input:focus { border-color: var(--primary); }
        
        .action-btn {
            background: var(--primary); color: white; border: none; padding: 16px; border-radius: 12px;
            font-size: 16px; font-weight: 600; cursor: pointer; transition: 0.2s; display: flex; justify-content: center; align-items: center; gap: 10px;
        }
        .action-btn:hover { background: var(--primary-hover); transform: translateY(-2px); }
        .action-btn:disabled { background: var(--text-muted); cursor: not-allowed; transform: none; }

        /* --- AI RESPONSE AREA --- */
        #ai-response {
            background: var(--surface-color); padding: 25px; border-radius: 20px;
            box-shadow: var(--shadow); border: 1px solid var(--border-color);
            display: none; line-height: 1.6;
        }
        #ai-response h2, #ai-response h3 { color: var(--primary); margin-top: 20px; margin-bottom: 10px; }
        #ai-response ul { margin-left: 20px; margin-bottom: 15px; }
        #ai-response li { margin-bottom: 8px; }
        #ai-response a { color: #3b82f6; text-decoration: none; font-weight: 600; }
        #ai-response a:hover { text-decoration: underline; }

        .loading-text { text-align: center; color: var(--text-muted); font-weight: 500; display: none; margin-bottom: 20px; }
    </style>
</head>
<body>

    <div id="splash-screen">
        <img src="icon.png" alt="ExploreX Logo" class="app-logo" onerror="this.src='https://via.placeholder.com/120/0f172a/0d9488?text=EX'">
        <h1 class="brand-name">Explore<span>X</span></h1>
        <div class="spinner"></div>
    </div>

    <div id="main-app">
        <header>
            <h1>✨ AI Route Intelligence</h1>
            <p>Powered by ExploreX Engine</p>
        </header>

        <div class="input-card">
            <div class="input-group">
                <label>Starting Point</label>
                <input type="text" id="origin" placeholder="e.g., Chennai, India">
            </div>
            <div class="input-group">
                <label>Destination</label>
                <input type="text" id="destination" placeholder="e.g., Munnar, Kerala">
            </div>
            <button class="action-btn" id="generate-btn">
                <span>Analyze & Plan Route</span> 🚀
            </button>
        </div>

        <div class="loading-text" id="loading-indicator">
            ExploreX AI is calculating routes, finding hotels, and fetching map data... ⏳
        </div>

        <div id="ai-response"></div>
    </div>

    <script>
        // --- SPLASH SCREEN LOGIC ---
        window.addEventListener('load', () => {
            setTimeout(() => {
                const splash = document.getElementById('splash-screen');
                const app = document.getElementById('main-app');
                
                splash.style.opacity = '0';
                setTimeout(() => {
                    splash.style.display = 'none';
                    app.style.display = 'block';
                }, 800); // Wait for fade transition
            }, 3000); // 3 Second Splash
        });

        // --- AI ROUTING LOGIC ---
        const generateBtn = document.getElementById('generate-btn');
        const originInput = document.getElementById('origin');
        const destInput = document.getElementById('destination');
        const responsePanel = document.getElementById('ai-response');
        const loader = document.getElementById('loading-indicator');

        generateBtn.addEventListener('click', async () => {
            const origin = originInput.value.trim();
            const destination = destInput.value.trim();

            if (!origin || !destination) {
                alert("Please enter both a starting point and a destination.");
                return;
            }

            // Update UI State
            generateBtn.disabled = true;
            loader.style.display = 'block';
            responsePanel.style.display = 'none';
            responsePanel.innerHTML = '';

            // The specific prompt forcing the AI to format the exact data you requested
            const smartPrompt = `As the ExploreX AI, analyze a trip from ${origin} to ${destination}. 
            Provide the following strictly structured with markdown headers:
            ### 📏 Distance & Travel Time
            (Give estimated distance and time)
            ### 🛣️ Routes Available
            (List number of routes and their specific names/highways)
            ### 🗺️ Live Navigation
            (Provide a clickable Google Maps directions URL from ${origin} to ${destination})
            ### 🏨 Hotel & Accommodation Ideas
            (Suggest 3 professional ideas for stays in ${destination})
            ### ⭐ Famous Spots & Tourist Activities
            (List 3-4 famous things to do in ${destination})`;

            const conversationHistory = [
                { role: "user", parts: [{ text: smartPrompt }] }
            ];

            try {
                // Pointing to your Hugging Face Backend!
                const response = await fetch('https://wasimakthar-explorex.hf.space/api/chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ history: conversationHistory })
                });

                if (!response.ok) throw new Error("Backend connection failed.");

                const data = await response.json();
                let markdownText = data.candidates[0].content.parts[0].text;

                // Simple parser to convert Markdown to HTML for the UI
                const htmlText = markdownText
                    .replace(/### (.*?)\n/g, '<h3>$1</h3>')
                    .replace(/\*\*(.*?)\*\*/g, '<b>$1</b>')
                    .replace(/\*(.*?)\*/g, '<i>$1</i>')
                    .replace(/\[(.*?)\]\((.*?)\)/g, '<a href="$2" target="_blank">$1</a>') // Maps links
                    .replace(/\n/g, '<br>');

                responsePanel.innerHTML = htmlText;
                responsePanel.style.display = 'block';

            } catch (error) {
                console.error(error);
                responsePanel.innerHTML = `<b style="color:#ef4444;">❌ System Error:</b> Could not connect to ExploreX AI Engine. Make sure your Hugging Face backend is running.`;
                responsePanel.style.display = 'block';
            } finally {
                generateBtn.disabled = false;
                loader.style.display = 'none';
            }
        });
    </script>
</body>
</html>
