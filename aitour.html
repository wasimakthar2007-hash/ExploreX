<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ExploreX Assistant | iOS Premium</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;800;900&family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        /* --- FUTURISTIC iOS DARK MODE VARIABLES --- */
        :root {
            --bg-dark: #000000;
            --bg-panel: #111113;
            --glass-bg: rgba(28, 28, 30, 0.65);
            --glass-border: rgba(255, 255, 255, 0.08);
            --primary: #06b6d4; /* Cyber Cyan */
            --primary-glow: rgba(6, 182, 212, 0.5);
            --secondary: #6366f1; /* Deep Purple */
            --text-main: #ffffff;
            --text-muted: #94a3b8;
            --user-bubble: linear-gradient(135deg, #3b82f6, #6366f1);
            --ai-bubble: rgba(30, 41, 59, 0.8);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
        
        body { 
            font-family: 'Plus Jakarta Sans', -apple-system, BlinkMacSystemFont, sans-serif;
            background-color: var(--bg-dark);
            color: var(--text-main);
            overflow: hidden; 
            height: 100vh;
            display: flex;
            flex-direction: column;
        }

        h1, h2, h3 { font-family: 'Outfit', sans-serif; }
        a { text-decoration: none; color: inherit; }

        /* --- BACKGROUND MESH FX --- */
        .bg-mesh {
            position: absolute; top: 0; left: 0; width: 100vw; height: 100vh; z-index: -1;
            background: radial-gradient(circle at 15% 50%, rgba(6, 182, 212, 0.15), transparent 25%),
                        radial-gradient(circle at 85% 30%, rgba(99, 102, 241, 0.15), transparent 25%);
            filter: blur(40px);
        }

        /* --- HEADER & NAVIGATION --- */
        header {
            display: flex; justify-content: space-between; align-items: center;
            padding: 20px 24px; background: transparent; z-index: 100;
            backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--glass-border);
        }
        
        .header-left { display: flex; align-items: center; gap: 15px; }
        
        .ai-identity { display: flex; align-items: center; gap: 12px; }
        
        /* Animated AI Avatar */
        .avatar-container { position: relative; width: 44px; height: 44px; display: flex; justify-content: center; align-items: center; }
        .avatar-core { width: 34px; height: 34px; background: linear-gradient(135deg, var(--primary), var(--secondary)); border-radius: 50%; z-index: 2; box-shadow: 0 0 20px var(--primary-glow); }
        .avatar-ring { position: absolute; width: 100%; height: 100%; border-radius: 50%; border: 2px solid var(--primary); z-index: 1; animation: pulseRing 2s cubic-bezier(0.4, 0, 0.6, 1) infinite; }
        
        @keyframes pulseRing {
            0% { transform: scale(0.8); opacity: 1; }
            100% { transform: scale(1.5); opacity: 0; }
        }

        .ai-text h1 { font-size: 18px; font-weight: 800; letter-spacing: -0.5px; }
        .ai-text p { font-size: 12px; color: var(--primary); font-weight: 600; display: flex; align-items: center; gap: 4px; }
        .ai-text p::before { content: ''; display: block; width: 6px; height: 6px; background: var(--primary); border-radius: 50%; box-shadow: 0 0 8px var(--primary); }

        /* --- CHAT AREA --- */
        #chat-container {
            flex: 1; overflow-y: auto; padding: 20px 24px;
            display: flex; flex-direction: column; gap: 20px;
            scroll-behavior: smooth;
        }
        #chat-container::-webkit-scrollbar { width: 5px; }
        #chat-container::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 10px; }

        .bubble-wrapper { display: flex; flex-direction: column; max-width: 85%; animation: slideUp 0.4s cubic-bezier(0.16, 1, 0.3, 1); }
        .bubble-wrapper.ai { align-self: flex-start; }
        .bubble-wrapper.user { align-self: flex-end; align-items: flex-end; }

        .bubble {
            padding: 16px 20px; font-size: 16px; line-height: 1.5; font-weight: 500;
            position: relative; word-wrap: break-word;
        }
        .bubble.ai { background: var(--ai-bubble); color: var(--text-main); border-radius: 20px 20px 20px 4px; border: 1px solid var(--glass-border); backdrop-filter: blur(10px); }
        .bubble.user { background: var(--user-bubble); color: white; border-radius: 20px 20px 4px 20px; box-shadow: 0 10px 20px rgba(59, 130, 246, 0.3); }

        /* Rich Text Formatting inside AI Bubbles */
        .bubble.ai b, .bubble.ai strong { color: var(--primary); }
        .bubble.ai ul { margin-left: 20px; margin-top: 10px; }
        .bubble.ai li { margin-bottom: 8px; }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Typing Indicator */
        .typing-indicator { display: flex; gap: 5px; padding: 5px 10px; }
        .dot { width: 8px; height: 8px; background: var(--text-muted); border-radius: 50%; animation: typing 1.4s infinite ease-in-out both; }
        .dot:nth-child(1) { animation-delay: -0.32s; }
        .dot:nth-child(2) { animation-delay: -0.16s; }
        @keyframes typing { 0%, 80%, 100% { transform: scale(0); opacity: 0.5; } 40% { transform: scale(1); opacity: 1; } }

        /* --- SWIPEABLE SUGGESTIONS --- */
        .suggestions-wrapper { padding: 10px 24px; display: flex; gap: 10px; overflow-x: auto; scrollbar-width: none; }
        .suggestions-wrapper::-webkit-scrollbar { display: none; }
        .chip { background: rgba(255,255,255,0.08); border: 1px solid rgba(255,255,255,0.15); color: white; padding: 10px 18px; border-radius: 20px; font-size: 14px; font-weight: 600; cursor: pointer; white-space: nowrap; transition: 0.2s; backdrop-filter: blur(10px); }
        .chip:hover { background: var(--primary); border-color: var(--primary); color: #000; }

        /* --- INPUT AREA --- */
        .input-area {
            padding: 15px 24px 30px; background: var(--glass-bg); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
            border-top: 1px solid var(--glass-border); display: flex; align-items: flex-end; gap: 12px;
        }
        
        .input-box {
            flex: 1; background: rgba(0,0,0,0.5); border: 1px solid var(--glass-border); border-radius: 24px;
            padding: 14px 20px; display: flex; align-items: center; gap: 10px; transition: 0.3s;
        }
        .input-box:focus-within { border-color: var(--primary); box-shadow: 0 0 15px rgba(6, 182, 212, 0.2); }
        
        .input-box input {
            flex: 1; background: transparent; border: none; color: white; font-size: 16px; font-family: 'Plus Jakarta Sans'; outline: none;
        }
        .input-box input::placeholder { color: var(--text-muted); }
        
        /* Send Button */
        .send-btn {
            width: 50px; height: 50px; border-radius: 50%; border: none; background: linear-gradient(135deg, var(--primary), var(--secondary));
            color: white; font-size: 20px; display: flex; justify-content: center; align-items: center; cursor: pointer;
            box-shadow: 0 10px 20px rgba(99, 102, 241, 0.4); transition: 0.2s; flex-shrink: 0;
        }
        .send-btn:hover { transform: scale(1.05); }
        .send-btn:active { transform: scale(0.95); }
    </style>
</head>
<body>

    <div class="bg-mesh"></div>

    <header>
        <div class="header-left">
            <div class="ai-identity">
                <div class="avatar-container">
                    <div class="avatar-ring"></div>
                    <div class="avatar-core"></div>
                </div>
                <div class="ai-text">
                    <h1>ExploreX AI</h1>
                    <p>Online & Ready</p>
                </div>
            </div>
        </div>
    </header>

    <div id="chat-container">
        <div class="bubble-wrapper ai">
            <div class="bubble ai">
                Hi there! I'm your premium ExploreX Planner. 🌍<br><br>
                Provide a destination to get localized travel itineraries, famous food spots, distance maps, and real-time cab/transportation options!
            </div>
        </div>
    </div>

    <div class="suggestions-wrapper" id="suggestions">
        <div class="chip" onclick="fillInput('Plan a 3-day trip to Paris with food spots and transport timing')">✨ 3 Days in Paris</div>
        <div class="chip" onclick="fillInput('Best budget street food spots & cab options in Tokyo')">🍜 Tokyo Street Food</div>
        <div class="chip" onclick="fillInput('Create a relaxing 5-day itinerary for Bali including local cabs')">🌴 5 Days in Bali</div>
    </div>

    <div class="input-area">
        <div class="input-box">
            <input type="text" id="chat-input" placeholder="Message ExploreX AI..." autocomplete="off">
        </div>
        <button class="send-btn" id="send-btn">➤</button>
    </div>

    <script>
        const chatContainer = document.getElementById('chat-container');
        const chatInput = document.getElementById('chat-input');
        const sendBtn = document.getElementById('send-btn');
        
        window.fillInput = (text) => {
            chatInput.value = text;
            chatInput.focus();
        };

        const scrollToBottom = () => {
            setTimeout(() => { chatContainer.scrollTop = chatContainer.scrollHeight; }, 50);
        };

        const addUserMessage = (text) => {
            const wrapper = document.createElement('div');
            wrapper.className = 'bubble-wrapper user';
            wrapper.innerHTML = `<div class="bubble user">${text}</div>`;
            chatContainer.appendChild(wrapper);
            scrollToBottom();
        };

        const addLoadingIndicator = () => {
            const wrapper = document.createElement('div');
            wrapper.className = 'bubble-wrapper ai';
            wrapper.id = 'loading-indicator';
            wrapper.innerHTML = `
                <div class="bubble ai typing-indicator">
                    <div class="dot"></div><div class="dot"></div><div class="dot"></div>
                </div>`;
            chatContainer.appendChild(wrapper);
            scrollToBottom();
        };

        const addAIMessage = (text) => {
            const loader = document.getElementById('loading-indicator');
            if(loader) loader.remove();

            // Simple markdown parsing for bolding and line breaks
            let formattedText = text
                .replace(/\*\*(.*?)\*\*/g, '<b>$1</b>')
                .replace(/\*(.*?)\*/g, '<i>$1</i>')
                .replace(/\n/g, '<br>');

            const wrapper = document.createElement('div');
            wrapper.className = 'bubble-wrapper ai';
            wrapper.innerHTML = `<div class="bubble ai">${formattedText}</div>`;
            chatContainer.appendChild(wrapper);
            scrollToBottom();
        };

        let conversationHistory = [
            {
                role: "user",
                parts: [{ text: "System Protocol: You are ExploreX AI, a premium travel intelligence assistant. When a user requests guidance on a place, provide structured details split into sections: 1. Vacation Itinerary & Ideas, 2. Distance Map Context, 3. Famous Local Food Spots, 4. Cab Facilities & Transport Timings. Format beautifully with bold headers." }]
            },
            {
                role: "model",
                parts: [{ text: "Protocol acknowledged. I will provide comprehensive, highly structured vacation itineraries, food highlights, and precise local transport insights." }]
            }
        ];

        const handleSend = async () => {
            const text = chatInput.value.trim();
            if (!text) return;

            addUserMessage(text);
            chatInput.value = '';
            addLoadingIndicator();

            conversationHistory.push({ role: "user", parts: [{ text: text }] });

            try {
                // =========================================================
                // THIS URL NOW POINTS DIRECTLY TO YOUR HUGGING FACE BACKEND
                // =========================================================
                const response = await fetch('https://wasimakthar-explorex.hf.space/api/chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ history: conversationHistory })
                });

                if (!response.ok) {
                    const errorData = await response.json();
                    throw new Error(errorData.error?.message || `HTTP standard error ${response.status}`);
                }

                const data = await response.json();
                const responseText = data.candidates[0].content.parts[0].text;

                conversationHistory.push({ role: "model", parts: [{ text: responseText }] });
                addAIMessage(responseText);

            } catch (error) {
                console.error("Fetch Error:", error);
                addAIMessage(`❌ **Connection Failed:**<br><br><span style="color:#ef4444; font-size:14px;">${error.message}</span><br><br>Make sure CORS is enabled on your backend and the Space is running.`);
                conversationHistory.pop(); // Remove the failed request
            }
        };

        sendBtn.addEventListener('click', handleSend);
        chatInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') handleSend();
        });
    </script>
</body>
</html>
